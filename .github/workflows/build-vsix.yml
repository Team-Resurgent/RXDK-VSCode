name: Build VSIX

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish the moving "latest" GitHub Release (same as a push to main)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  # Authenticated GitHub API (5000/hr) vs unauthenticated (60/hr per shared runner IP);
  # used by the Publish GitHub Release job. Host tools are no longer bundled — the
  # extension downloads them at runtime (src/hostTools.ts) / scripts/setup.ps1.
  GH_TOKEN: ${{ github.token }}
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  build:
    name: Build cross-platform VSIX
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build VSIX
        run: ./scripts/build-vsix.ps1 -ExtensionRoot $env:GITHUB_WORKSPACE

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: rxdk-vscode-vsix
          path: rxdk-vscode-*.vsix
          if-no-files-found: error
          compression-level: 0

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v5
        with:
          name: rxdk-vscode-release-zip
          path: release/rxdk-vscode-*.zip
          if-no-files-found: error
          compression-level: 0

      - name: Write job summary
        run: |
          $ErrorActionPreference = 'Stop'
          $vsix = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter 'rxdk-vscode-*.vsix' |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          $zip = Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE 'release') -Filter 'rxdk-vscode-*.zip' |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $vsix) {
            throw 'VSIX not found after build'
          }
          if (-not $zip) {
            throw 'Release zip not found after build'
          }
          $sizeMb = [math]::Round($vsix.Length / 1MB, 2)
          $zipMb = [math]::Round($zip.Length / 1MB, 2)
          @(
            '### RXDK VSIX build',
            '',
            '| Artifact | Size |',
            '|----------|------|',
            "| ``$($vsix.Name)`` | ${sizeMb} MB |",
            "| ``$($zip.Name)`` (VSIX + install scripts) | ${zipMb} MB |",
            '',
            'Host tools are bundled for `win-x64`, `linux-x64`, `osx-x64`, and `osx-arm64` under `sdk/tools/<rid>/`.',
            '`xdvdfs` is downloaded from [Team-Resurgent/xdvdfs releases](https://github.com/Team-Resurgent/xdvdfs/releases/latest).',
            'Xbox headers/libs are cloned from [RXDK-SDK](https://github.com/Team-Resurgent/RXDK-SDK) on first extension launch.',
            'Compiling Xbox titles uses **Zig** (RXDK prerequisites) on Windows, macOS, and Linux.',
            '',
            'Install from release zip:',
            '```powershell',
            '# Windows: extract zip, then',
            '.\install-extension.cmd',
            '```',
            '```bash',
            '# macOS / Linux: extract zip, then',
            'chmod +x install-extension.sh && ./install-extension.sh',
            '```'
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8

  release:
    name: Publish GitHub Release
    needs: build
    if: |
      github.event_name != 'pull_request' && (
        startsWith(github.ref, 'refs/tags/v') ||
        github.ref == 'refs/heads/main' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download release zip artifact
        uses: actions/download-artifact@v5
        with:
          name: rxdk-vscode-release-zip
          path: dist

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # An explicit v* tag makes a permanent, versioned release.
            tag="${GITHUB_REF#refs/tags/}"
            moving=false
          else
            # Push to main (or a manual publish): move a single "latest" release to
            # this build so .../RXDK-VSCode/releases/latest always serves the newest
            # VSIX, mirroring how RXDK-Tools publishes its moving "latest".
            tag="latest"
            moving=true
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "moving=${moving}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${tag} (moving=${moving})"

      - name: Move the 'latest' tag/release to this build
        if: steps.meta.outputs.moving == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # Delete any prior "latest" release AND its git tag so the create step
          # recreates both pointing at this commit (gh won't move an existing tag).
          # Non-fatal on the first run when nothing exists yet.
          gh release delete latest --repo "${{ github.repository }}" --cleanup-tag --yes || true

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*.zip)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release zip in dist/" >&2
            exit 1
          fi
          # Both the moving "latest" and any v* tag are the repo's Latest release, so
          # /releases/latest resolves to them.
          gh release create "${{ steps.meta.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --target "${GITHUB_SHA}" \
            --title "RXDK VSCode ${{ steps.meta.outputs.tag }}" \
            --generate-notes \
            --latest \
            "${files[@]}"

      - name: Write release summary
        shell: bash
        run: |
          {
            echo "### GitHub Release"
            echo ""
            echo "- Tag: \`${{ steps.meta.outputs.tag }}\`"
            echo "- Moving latest: \`${{ steps.meta.outputs.moving }}\`"
            echo "- Artifact: \`rxdk-vscode-*.zip\` (VSIX + install scripts; VSIX is not attached separately)"
          } >> "$GITHUB_STEP_SUMMARY"
