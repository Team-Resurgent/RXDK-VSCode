<H1><A name="_dx_k_glos"></A>K</H1>

<DL>
<DT><A NAME="_kerberos_protocol_gloss"></A><b>Kerberos protocol</b></DT>

<DD>A standard protocol widely deployed and used for authentication. Xbox consoles and the Xbox <i>Live</i> service use this protocol to mutually authenticate. See also <a href="a.htm#_authentication_gloss">authentication</a>.</DD>
