<h1>Polygons</h1>
<p>A polygon is a closed figure with an arbitrary number of sides. Polygons must 
		be convex. The last vertex is joined with the first vertex.</p><img src="images/polygon.jpg"><div class="footer" id="footer">Unpublished work.  © 2000 Microsoft Corporation.  All rights reserved.</div>
