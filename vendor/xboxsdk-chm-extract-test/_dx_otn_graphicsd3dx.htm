<H1><A NAME="_dx_otn_graphicsd3dx"></A>oT<I>n</I></H1>

<P>The output texture coordinates registers. Specifically, these are an array of output data registers that are iterated and used as texture coordinates by the sampling stages routing data to the pixel shader.</P>
